version: '3.1'
services:
  thecodebeyond_client:
    image: cloud.canister.io:5000/orderzz/thecodebeyond-client:1.1
    volumes:
        - ./client/proxy/nginx.conf:/etc/nginx/conf.d/default.conf
        - /etc/letsencrypt/live/thecodebeyond.com/fullchain.pem:/certs/fullchain.pem
        - /etc/letsencrypt/live/thecodebeyond.com/privkey.pem:/certs/privkey.pem
    networks:
        - server_load_balancer
    depends_on:
        - thecodebeyond_server
  thecodebeyond_server:
    image: rabihandari/thecodebeyond:1.0
    env_file:
        - ./server/.env
    networks:
        - server_load_balancer
  mongo:
    image: mongo:6.0.5
    restart: always
    environment:
        MONGO_INITDB_ROOT_USERNAME: rabihandari
        MONGO_INITDB_ROOT_PASSWORD: EatMyRaze_123
        MONGO_INITDB_DATABASE: thecodebeyond
    volumes:
        - mongo-data:/data/db
        - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
        - server_load_balancer
  mongo-express:
    image: mongo-express
    restart: always
    ports:
        - 8081:8081
    environment:
        ME_CONFIG_MONGODB_ADMINUSERNAME: rabihandari
        ME_CONFIG_MONGODB_ADMINPASSWORD: EatMyRaze_123
        ME_CONFIG_MONGODB_URL: mongodb://rabihandari:EatMyRaze_123@mongo:27017/thecodebeyond?authSource=admin
        ME_CONFIG_BASICAUTH_USERNAME: mexpress
        ME_CONFIG_BASICAUTH_PASSWORD: mexpress
    networks:
        - server_load_balancer
    depends_on:
        - mongodb

volumes:
  mongo-data:

networks:
    server_load_balancer:
        external: true